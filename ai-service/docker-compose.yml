services:
  api:
    build: .
    container_name: furniture_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data/images:/data/images
      - ./secrets:/secrets:ro
      - ../data:/data/pipeline:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  migrate:
    build: .
    command: alembic upgrade head
    env_file:
      - .env
    volumes:
      - .:/app
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    container_name: furniture_worker
    command: python -m app.workers.rq_worker
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data/images:/data/images
      - ./secrets:/secrets:ro
      - ../data:/data/pipeline:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: furniture_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-furniture_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-furniture_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: furniture_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: furniture_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  adminer:
    image: adminer:latest
    container_name: furniture_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
